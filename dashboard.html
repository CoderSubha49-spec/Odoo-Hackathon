<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Employee Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f3f4f6; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #714B67; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 22px; }
        .sidebar a { color: #e5e7eb; text-decoration: none; padding: 12px; margin-bottom: 8px; border-radius: 6px; font-weight: 500; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #5a3c52; color: white; }
        .logout { margin-top: auto; background: #dc2626 !important; text-align: center; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 24px; }
        .header h1 { color: #1f2937; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { color: #4b5563; margin-bottom: 10px; font-size: 16px; }
        .card .value { font-size: 24px; font-weight: bold; color: #111827; }
        .btn { padding: 10px 20px; background: #714B67; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn:hover { background: #5a3c52; }
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        label { font-weight: 600; color: #4b5563; font-size: 14px; }
        input, select, textarea { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Odoo HRMS</h2>
        <a href="#" class="active">Dashboard</a>
        <a href="#" onclick="alert('Profile section opened!')">My Profile</a>
        <a class="logout" href="index.html">Logout</a>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Welcome Back, Employee!</h1>
            <p>Every workday, perfectly aligned.</p>
        </div>
        <div class="grid">
            <div class="card">
                <h3>Attendance Status</h3>
                <div class="value" id="status-text">Not Checked In</div>
                <p id="time-text" style="color: #6b7280; font-size: 13px; margin: 5px 0 15px 0;">---</p>
                <button class="btn" id="attendance-btn" onclick="toggleAttendance()">Check In</button>
            </div>
            <div class="card">
                <h3>Leave Balance</h3>
                <div class="value">14 Days Remaining</div>
                <p style="color: #6b7280; font-size: 13px; margin-top: 5px;">Paid / Sick / Unpaid Leaves</p>
            </div>
            <div class="card">
                <h3>Estimated Payroll Structure</h3>
                <div class="value">₹45,000 / month</div>
                <p style="color: #10b981; font-size: 13px; margin-top: 5px;">✓ Direct Deposit Active</p>
            </div>
        </div>
        <div class="card" style="max-width: 500px;">
            <h3>Apply for Leave</h3>
            <form onsubmit="event.preventDefault(); alert('Leave Request Submitted!');">
                <div>
                    <label>Leave Type</label>
                    <select><option>Paid Leave</option><option>Sick Leave</option><option>Unpaid Leave</option></select>
                </div>
                <div><label>Choose Date Range</label><input type="date" required></div>
                <div><label>Remarks</label><textarea placeholder="Reason..." rows="3"></textarea></div>
                <button type="submit" class="btn">Submit Leave</button>
            </form>
        </div>
    </div>
    <script>
        let checkedIn = false;
        function toggleAttendance() {
            const btn = document.getElementById('attendance-btn');
            const status = document.getElementById('status-text');
            const timeLog = document.getElementById('time-text');
            const now = new Date().toLocaleTimeString();
            if (!checkedIn) {
                status.innerText = "Present"; status.style.color = "#10b981"; timeLog.innerText = "Checked in at: " + now;
                btn.innerText = "Check Out"; btn.style.background = "#dc2626"; checkedIn = true;
            } else {
                status.innerText = "Not Checked In"; status.style.color = "#111827"; timeLog.innerText = "Last session ended at: " + now;
                btn.innerText = "Check In"; btn.style.background = "#714B67"; checkedIn = false;
            }
        }
    </script>
</body>
</html>
